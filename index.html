<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CALCULATOR</title>
        <link rel = "stylesheet" href ="style.css">
    </head>
    <body>
        <div class = "main-container">
            <input type="text" id="display" readonly>
            <div class = "buttons">
                <!--NUMBERS-->
                <button>0</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>

                <!--OPERATORS-->
                <button>+</button>
                <button>-</button>
                <button>*</button>
                <button>/</button>

                <!--CLEAR AND EQUALS-->
                <button class ="clear">C</button>
                <button class="equal">=</button>
                <button class = "decimal">.</button>
            </div>
        </div>
        <!--EXTERNAL JAVASCRIPT-->
        <script src ="script.js"></script>
    </body>
    </html>
